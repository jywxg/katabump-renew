name: Katabump Auto Renew

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  renew:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      actions: write

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'


      - name: Start GOST SOCKS5 Forward
        env:
          UPSTREAM_SOCKS5: ${{ secrets.GOST_PROXY }}
        run: |
          GOST_VERSION=$(curl -s https://api.github.com/repos/go-gost/gost/releases/latest | grep tag_name | cut -d '"' -f4)
wget -q "https://github.com/go-gost/gost/releases/download/${GOST_VERSION}/gost_${GOST_VERSION#v}_linux_amd64.tar.gz" -O gost.tar.gz
          tar -xzf gost.tar.gz
          chmod +x gost
          nohup ./gost -L "socks5://runner:runner@127.0.0.1:1080" -F "$UPSTREAM_SOCKS5" > gost.log 2>&1 &
          sleep 5
          ss -lntp | grep 1080 || true

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb
          npm install
          npx playwright install-deps chrome

      - name: Run Renew Script
        env:
          USERS_JSON: ${{ secrets.USERS_JSON }}
          GOST_PROXY: socks5://runner:runner@127.0.0.1:1080
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: xvfb-run --auto-servernum --server-args="-screen 0 1280x720x24" node action_renew.js

      - name: Upload Screenshots
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: screenshots
          path: screenshots/

      - name: Cleanup Old Workflow Runs
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          REPO="${{ github.repository }}"

          gh api repos/$REPO/actions/runs             --paginate             --jq '.workflow_runs[].id' > runs.txt

          skip=1

          while read run_id; do
            if [ "$skip" -eq 1 ]; then
              skip=0
              continue
            fi

            echo "Deleting workflow run: $run_id"

            gh api               -X DELETE               repos/$REPO/actions/runs/$run_id               || true

          done < runs.txt
